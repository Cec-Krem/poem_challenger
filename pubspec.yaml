name: poem_challenger
description: "Une application faite pour créer des poèmes, contre-la-montre et avec une gestion de mots à placer."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.1.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
